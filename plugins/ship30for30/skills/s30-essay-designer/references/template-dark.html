<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{HEADLINE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="{{FONT_IMPORT}}" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  .card {
    width: 540px;
    min-height: 675px;
    background: {{BACKGROUND}};
    border-radius: {{BORDER_RADIUS}};
    border-top: 4px solid {{PRIMARY}};
    padding: 48px 44px 36px;
    font-family: '{{BODY_FONT}}', serif;
    color: {{TEXT}};
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 40px {{PRIMARY}}15, 0 4px 24px rgba(0,0,0,0.4);
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid {{PRIMARY}}40;
  }
  .handle {
    font-family: '{{BODY_FONT}}', sans-serif;
    font-size: 14px;
    color: {{SECONDARY}};
    font-weight: 500;
  }
  h1 {
    font-family: '{{HEADING_FONT}}', serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1.3;
    color: {{TEXT}};
    margin-bottom: 24px;
  }
  .body { flex: 1; }
  .body p {
    font-size: 18px;
    line-height: 1.65;
    margin: 0.5em 0;
  }
  .body p.isolated {
    margin: 1.5em 0;
  }
  .body h2, .body .subhead {
    font-family: '{{HEADING_FONT}}', serif;
    font-size: 20px;
    font-weight: 700;
    color: {{PRIMARY}};
    margin-top: 2em;
    margin-bottom: 0.5em;
    text-shadow: 0 0 20px {{PRIMARY}}30;
  }
  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid {{SECONDARY}}25;
  }
  .footer-handle {
    font-size: 14px;
    color: {{SECONDARY}};
    font-weight: 500;
  }
  .day-badge {
    font-size: 12px;
    font-weight: 600;
    color: {{PRIMARY}};
    background: {{PRIMARY}}18;
    padding: 4px 12px;
    border-radius: 100px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    box-shadow: 0 0 12px {{PRIMARY}}15;
  }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <img class="avatar" src="{{AVATAR_URL}}" alt="" onerror="this.style.display='none'">
    <span class="handle">{{HANDLE}}</span>
  </div>
  <h1>{{HEADLINE}}</h1>
  <div class="body">
    {{BODY_HTML}}
  </div>
  <div class="card-footer">
    <span class="footer-handle">{{HANDLE}}</span>
    <span class="day-badge">Day {{DAY_NUMBER}} of 30</span>
  </div>
</div>
</body>
</html>
